<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Signal — Dev Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
        }
        header {
            background: #151515;
            border-bottom: 1px solid #2a2a2a;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 {
            font-size: 18px;
            font-weight: 500;
            color: #ff8833;
        }
        header h1 span { color: #666; font-weight: 300; }
        #status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            background: #331111;
            color: #cc4444;
        }
        #status.connected {
            background: #113311;
            color: #44cc44;
        }
        .container {
            display: flex;
            height: calc(100vh - 49px);
        }
        nav {
            width: 200px;
            background: #111;
            border-right: 1px solid #2a2a2a;
            padding: 16px 0;
            flex-shrink: 0;
        }
        nav a {
            display: block;
            padding: 10px 20px;
            color: #aaa;
            text-decoration: none;
            font-size: 13px;
            border-left: 3px solid transparent;
            cursor: pointer;
        }
        nav a:hover { background: #1a1a1a; color: #ddd; }
        nav a.active {
            color: #ff8833;
            border-left-color: #ff8833;
            background: #1a1a0a;
        }
        nav .section-label {
            padding: 8px 20px 4px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
        }
        main {
            flex: 1;
            padding: 24px;
            overflow: auto;
        }
        .tool-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .tool-header h2 {
            font-size: 20px;
            font-weight: 400;
        }
        select, button {
            font-family: inherit;
            font-size: 13px;
            padding: 8px 16px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1a1a1a;
            color: #e0e0e0;
            cursor: pointer;
        }
        button {
            background: #cc6622;
            border-color: #cc6622;
            color: white;
            font-weight: 500;
        }
        button:hover { background: #dd7733; }
        button:disabled {
            background: #333;
            border-color: #333;
            color: #666;
            cursor: not-allowed;
        }
        .svg-container {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 16px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }
        .svg-container svg {
            max-width: 100%;
            height: auto;
        }
        .placeholder {
            color: #444;
            font-size: 14px;
        }
        .log {
            margin-top: 16px;
            padding: 12px;
            background: #111;
            border: 1px solid #222;
            border-radius: 4px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 11px;
            color: #888;
            max-height: 120px;
            overflow-y: auto;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top-color: #ff8833;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <h1>The Signal <span>Dev Tools</span></h1>
        <div id="status">Disconnected</div>
    </header>
    <div class="container">
        <nav>
            <div class="section-label">Level Design</div>
            <a class="active" onclick="showTool('floorplan')">Floor Plans</a>
            <a onclick="showTool('placeholder')">Level Scanner</a>
            <div class="section-label">Content</div>
            <a onclick="showTool('placeholder')">Note Generator</a>
            <a onclick="showTool('placeholder')">Loot Tables</a>
            <div class="section-label">Utilities</div>
            <a onclick="showTool('placeholder')">CDO Configurator</a>
            <a onclick="showTool('placeholder')">Actor Scanner</a>
        </nav>
        <main>
            <!-- Floor Plan Tool -->
            <div id="tool-floorplan">
                <div class="tool-header">
                    <h2>Floor Plan Generator</h2>
                    <select id="floor-select">
                        <option value="1">Floor 1</option>
                        <option value="2">Floor 2</option>
                        <option value="3">Floor 3</option>
                        <option value="4">Floor 4</option>
                        <option value="5" selected>Floor 5</option>
                    </select>
                    <button id="btn-generate" onclick="generateFloorPlan()">Generate SVG</button>
                    <button id="btn-download" onclick="downloadSVG()" disabled>Download</button>
                </div>
                <div class="svg-container" id="svg-output">
                    <span class="placeholder">Select a floor and click Generate</span>
                </div>
                <div class="log" id="log-output"></div>
            </div>

            <!-- Placeholder for future tools -->
            <div id="tool-placeholder" style="display:none;">
                <h2 style="color:#444; margin-top:100px; text-align:center;">Coming soon</h2>
            </div>
        </main>
    </div>

    <script>
        let currentSVG = null;

        // Check editor connection
        async function checkStatus() {
            try {
                const resp = await fetch('/api/status');
                const data = await resp.json();
                const el = document.getElementById('status');
                if (data.connected) {
                    el.textContent = 'Editor Connected';
                    el.className = 'connected';
                } else {
                    el.textContent = 'Disconnected';
                    el.className = '';
                }
            } catch {
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').className = '';
            }
        }
        setInterval(checkStatus, 5000);
        checkStatus();

        function showTool(name) {
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tool-floorplan').style.display = name === 'floorplan' ? 'block' : 'none';
            document.getElementById('tool-placeholder').style.display = name === 'placeholder' ? 'block' : 'none';
        }

        async function generateFloorPlan() {
            const floor = parseInt(document.getElementById('floor-select').value);
            const btn = document.getElementById('btn-generate');
            const output = document.getElementById('svg-output');
            const log = document.getElementById('log-output');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Generating...';
            output.innerHTML = '<span class="placeholder">Scanning level geometry...</span>';
            log.textContent = '';

            try {
                const resp = await fetch('/api/floorplan', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({floor})
                });
                const data = await resp.json();

                if (data.success && data.svg) {
                    output.innerHTML = data.svg;
                    currentSVG = data.svg;
                    document.getElementById('btn-download').disabled = false;
                } else {
                    output.innerHTML = `<span class="placeholder" style="color:#cc4444;">${data.error || 'Generation failed'}</span>`;
                }

                if (data.log) {
                    log.textContent = data.log.map(l => l.message).join('\n');
                }
            } catch (e) {
                output.innerHTML = `<span class="placeholder" style="color:#cc4444;">Error: ${e.message}</span>`;
            }

            btn.disabled = false;
            btn.textContent = 'Generate SVG';
        }

        function downloadSVG() {
            if (!currentSVG) return;
            const floor = document.getElementById('floor-select').value;
            const blob = new Blob([currentSVG], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `F${floor}_floorplan.svg`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
